<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Jogo Jokenpo</title>
</head>

<body class="background">
    <section class="container">
        <div class="logo">
            <h1>Jokenpo</h1>
        </div>
        <div class="resultado-placar">
            <div class="jogador">
                <p>Jogador</p>
                <span id="jogador">00</span>
            </div>
            <div class="vs">VS</div>
            <div class="computador">
                <p>Alexa AI</p>
                <span id="computador">00</span>
            </div>
        </div>
        <div class="resultado-jogo">
            <div class="player" id="player">✊</div>
                <div class="resultado">
                    <p id="resultado">Vamos Jogar</p>
                </div>
            <div class="alexa" id="alexaIa">✊</div>
        </div>
        <div class="jogar">
            <button class="card">
                <span>✊</span>
                <p>Pedra</p>
            </button>
            <button class="card">
                <span>✋</span>
                <p>Papel</p>
            </button>
            <button class="card">
                <span>✌️</span>
                <p>Tesoura</p>
            </button>
        </div>

    </section>
</body>
<script src="script.js"></script>
</html>
