<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Jogo Jokenpo</title>
</head>
<body>
    <section>
        <div class="logo">
            <h1>Jokenpo</h1>
        </div>
        <div class="jogar">
            <div class="pedra">
                <span>✊</span>
                <p>Pedra</p>
            </div>
            <div class="papel">
                <span>✋</span>
                <p>Papel</p>
            </div>
            <div class="tesoura">
                <span>✌️</span>
                <p>Tesoura</p>
            </div>
        </div>
        <div class="resultado">
            <div class="jogador">
                <h2>Jogador</h2>
                <span id="jogador">0</span>
            </div>
            <div class="vs">
                <p>VS</p>
            </div>
            <div class="computador">
                <h2>Computador</h2>
                <span id="computador">0</span>
            </div>
        </div>
    </section>
</body>
</html>
